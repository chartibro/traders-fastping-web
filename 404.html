<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA 라우팅: 경로를 쿼리스트링으로 변환해 index.html로 리다이렉트
    var path = window.location.pathname;
    window.location.replace(
      window.location.origin + '/?p=' + encodeURIComponent(path)
    );
  </script>
</head>
<body></body>
</html>
